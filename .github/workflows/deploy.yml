name: Deploy to Hostinger KVM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /home/aprova-deploy/aprova-cards-v2
            
            # Pull latest code
            git pull origin main
            
            # Ensure .env exists (will be managed separately)
            if [ ! -f .env ]; then
              echo "⚠️  .env não encontrado! Configure manualmente na KVM."
              exit 1
            fi
            
            echo "🔨 Building frontend..."
            cd frontend
            npm ci  # Clean install
            npm run build
            
            echo "🔨 Building backend..."
            cd ../backend
            go mod download
            go build -o main cmd/server/main.go
            
            echo "🔄 Restarting services..."
            systemctl restart aprova-backend aprova-frontend || sudo systemctl restart aprova-backend aprova-frontend
            
            echo "✅ Deploy concluído!"

  notify-slack:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Deploy Status: ${{ needs.deploy.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Aprova Cards Deploy*\nStatus: ${{ needs.deploy.result }}\nCommit: ${{ github.sha }}\nAutor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        if: secrets.SLACK_WEBHOOK_URL != ''
