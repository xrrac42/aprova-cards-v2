name: Deploy to KVM (Dev)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run backend tests
        working-directory: backend
        run: |
          go mod download
          go test ./... -v -race -count=1

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 10m
          script: |
            set -e
            export PATH=$PATH:/usr/local/go/bin
            DEPLOY_DIR="/opt/aprova-cards"
            cd "$DEPLOY_DIR"

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "❌ .env não encontrado!"
              exit 1
            fi

            ln -sf ../.env backend/.env

            echo "📦 Installing frontend dependencies..."
            cd frontend
            npm ci --ignore-scripts 2>/dev/null || npm install
            echo "🔨 Building frontend..."
            npm run build
            cd ..

            echo "🔨 Building backend..."
            cd backend
            go mod download
            CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/aprova-cards ./cmd/server/main.go
            cd ..

            echo "🔄 Restarting services..."
            set +e
            pkill -f "aprova-cards" 2>/dev/null
            pkill -f "serve.*frontend/dist" 2>/dev/null
            sleep 2
            set -e

            cd /opt/aprova-cards/backend
            nohup ./bin/aprova-cards > /tmp/aprova-backend.log 2>&1 &
            cd /opt/aprova-cards/frontend
            nohup npx serve -s dist -l 5173 > /tmp/aprova-frontend.log 2>&1 &

            sleep 5
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "✅ Backend healthy!"
            else
              echo "⚠️ Backend health check failed"
            fi
            echo "✅ Deploy concluído!"